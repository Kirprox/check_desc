apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkexam
spec:
  replicas: 1
  selector:
    matchLabels:
      app: checkexam
  template:
    metadata:
      labels:
        app: checkexam
    spec:
      containers:
        - name: checkexam
          image: checkexam:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
---
apiVersion: v1
kind: Service
metadata:
  name: checkexam
spec:
  selector:
    app: checkexam
  ports:
    - port: 8081
      targetPort: 8081