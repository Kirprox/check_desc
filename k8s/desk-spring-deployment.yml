apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkdesc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: checkdesc
  template:
    metadata:
      labels:
        app: checkdesc
    spec:
      containers:
        - name: checkdesc
          image: checkdesc:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: checkdesc
spec:
  selector:
    app: checkdesc
  ports:
    - port: 8080
      targetPort: 8080